[project]
name = "dqmeasure"
version = "0.1.0"
description = "Data-quality metrics from ISO/IEC 25024 and ISO/IEC 5259"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "narwhals>=1.0",
    "polars>=1.0",
]

[dependency-groups]
docs = [
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.27",
]

[build-system]
requires = ["uv_build>=0.11,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "dqmeasure"
module-root = "src"
